name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Repository Description
        run: |
          echo "Release ${{ github.ref_name }} published"
          echo "Repository: discord-quest-auto-completer"
          echo "Description: Discord Quest Auto Completer | Auto complete Discord quests with a beautiful in-app dashboard"
