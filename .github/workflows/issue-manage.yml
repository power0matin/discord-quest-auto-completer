name: Issue Management

on:
  issues:
    types: [opened, edited, closed, reopened]

jobs:
  manage-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Process Issue
        uses: actions/github-script@v6
        with:
          script: |
            const issue = context.payload.issue;
            const action = context.payload.action;
            
            console.log(`Issue ${action}: ${issue.title}`);
            console.log(`Number: ${issue.number}`);
            console.log(`Labels: ${issue.labels.map(l => l.name).join(', ')}`);
            
            // Auto-label based on title
            const labels = [];
            
            if (issue.title.toLowerCase().includes('bug')) {
              labels.push('bug');
            }
            
            if (issue.title.toLowerCase().includes('feature')) {
              labels.push('enhancement');
            }
            
            if (issue.title.toLowerCase().includes('question')) {
              labels.push('question');
            }
            
            if (issue.title.toLowerCase().includes('documentation')) {
              labels.push('documentation');
            }
            
            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: labels
              });
              console.log(`Added labels: ${labels.join(', ')}`);
            }
            
            // Add welcome message for new issues
            if (action === 'opened') {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Thank you for opening an issue in the Discord Quest Auto Completer repository!
            
            Please provide as much detail as possible so we can help you effectively.
            
            For bug reports, please include:
            - Steps to reproduce
            - Expected behavior
            - Actual behavior
            - Environment (OS, Discord version)
            
            For feature requests, please describe:
            - The problem you're trying to solve
            - Your proposed solution
            - Any alternatives you've considered
            
            Thank you for contributing to the project!`
              });
            }
